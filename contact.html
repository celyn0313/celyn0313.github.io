<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>联系我们 - 广州铭镁机电有限公司</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav class="container">
            <div class="logo">
                <img src="images/logo.png" alt="广州铭镁机电" style="height: 50px;">
            </div>
            <div class="menu-toggle">
                <span></span>
                <span></span>
                <span></span>
            </div>
            <ul class="nav-links">
                <li><a href="index.html">首页</a></li>
                <li><a href="products.html">产品服务</a></li>
                <li><a href="news.html">新闻动态</a></li>
                <li><a href="contact.html" class="active">联系我们</a></li>
            </ul>
        </nav>
    </header>

    <section class="page-header">
        <div class="container">
            <h1>联系我们</h1>
            <p>期待与您合作，共创美好未来</p>
        </div>
    </section>

    <section class="contact-section">
        <div class="container">
            <div class="contact-grid">
                <div class="contact-form">
                    <h3>在线留言</h3>
                    <form id="contactForm">
                        <div class="form-group">
                            <label for="name">姓名 *</label>
                            <input type="text" id="name" name="name" placeholder="请输入您的姓名">
                            <div class="error-message"></div>
                        </div>
                        <div class="form-group">
                            <label for="phone">电话 *</label>
                            <input type="text" id="phone" name="phone" placeholder="请输入您的联系电话">
                            <div class="error-message"></div>
                        </div>
                        <div class="form-group">
                            <label for="email">邮箱 *</label>
                            <input type="email" id="email" name="email" placeholder="请输入您的电子邮箱">
                            <div class="error-message"></div>
                        </div>
                        <div class="form-group">
                            <label for="company">公司名称</label>
                            <input type="text" id="company" name="company" placeholder="请输入您的公司名称">
                        </div>
                        <div class="form-group">
                            <label for="message">留言内容 *</label>
                            <textarea id="message" name="message" placeholder="请输入您的留言内容..."></textarea>
                            <div class="error-message"></div>
                        </div>
                        <button type="submit" class="btn">提交留言</button>
                    </form>
                </div>

                <div class="contact-info">
                    <h3>联系方式</h3>
                    <div class="info-item">
                        <i class="fas fa-map-marker-alt"></i>
                        <div>
                            <h4>公司地址</h4>
                            <p>广州市白云区机场路1794号317室</p>
                        </div>
                    </div>
                    <div class="info-item">
                        <i class="fas fa-phone-alt"></i>
                        <div>
                            <h4>服务热线</h4>
                            <a href="tel:020-12345678">15738269059</a>
                        </div>
                    </div>
                    <div class="info-item">
                        <i class="fas fa-headset"></i>
                        <div>
                            <h4>技术咨询</h4>
                            <a href="tel:020-87654321">18925129168</a>
                        </div>
                    </div>
                    <div class="info-item">
                        <i class="fas fa-envelope"></i>
                        <div>
                            <h4>电子邮箱</h4>
                            <a href="mailto:info@mingmei.com">chenyuyu0410@outlook.com</a>
                        </div>
                    </div>
                    <div class="info-item">
                        <i class="fas fa-clock"></i>
                        <div>
                            <h4>工作时间</h4>
                            <p>周一至周五 8:30-17:30</p>
                        </div>
                    </div>


                </div>
            </div>
        </div>
    </section>

    <footer>
        <div class="container">
            <p>&copy; 2026 广州铭镁机电有限公司 Guangzhou Mingmei Electromechanical Co., Ltd. 版权所有</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
